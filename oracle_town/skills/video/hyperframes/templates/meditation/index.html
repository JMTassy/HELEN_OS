<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>HELEN — Temple Meditation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: #08080f;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }

    /* Sub-composition slots */
    .slot {
      position: absolute;
      top: 0; left: 0;
      width: 1920px; height: 1080px;
      opacity: 0;
    }
    iframe.slot {
      border: none;
      background: transparent;
    }
  </style>
</head>
<body>
  <!--
    HELEN TEMPLE MEDITATION — root master timeline
    4 compositions, 120s total.

    data-start:    seconds from video start
    data-duration: seconds this composition is active
    data-fade-in:  fade-in duration (seconds)
    data-fade-out: fade-out duration (seconds)
  -->

  <!-- Beat 1: Sigil (0–10s) -->
  <iframe
    id="comp-sigil"
    class="slot"
    src="compositions/01-sigil.html"
    data-start="0"
    data-duration="10"
    data-fade-in="1.5"
    data-fade-out="1.5"
  ></iframe>

  <!-- Beat 2: Temple breath — ambient background (6–116s) -->
  <iframe
    id="comp-breath"
    class="slot"
    src="compositions/02-temple-breath.html"
    data-start="6"
    data-duration="110"
    data-fade-in="3"
    data-fade-out="4"
  ></iframe>

  <!-- Beat 3: Text river — word-by-word reveal (12–108s) -->
  <iframe
    id="comp-text"
    class="slot"
    src="compositions/03-text-river.html"
    data-start="12"
    data-duration="96"
    data-fade-in="2"
    data-fade-out="3"
  ></iframe>

  <!-- Beat 4: Receipt seal (112–120s) -->
  <iframe
    id="comp-seal"
    class="slot"
    src="compositions/04-receipt-seal.html"
    data-start="112"
    data-duration="8"
    data-fade-in="2"
    data-fade-out="1.5"
  ></iframe>

  <!-- Voiceover — generated by Gemini TTS Zephyr -->
  <audio id="vo" src="assets/voiceover.wav" preload="auto"></audio>

  <script>
    // ── Master timeline ──────────────────────────────────────────────────────
    const tl = gsap.timeline({ paused: true });
    const vo = document.getElementById('vo');

    document.querySelectorAll('.slot[data-start]').forEach(el => {
      const start    = parseFloat(el.dataset.start);
      const dur      = parseFloat(el.dataset.duration);
      const fadeIn   = parseFloat(el.dataset.fadeIn  || 0.8);
      const fadeOut  = parseFloat(el.dataset.fadeOut || 0.8);
      const end      = start + dur;

      tl.to(el, { opacity: 1, duration: fadeIn, ease: 'power2.in' }, start);
      tl.to(el, { opacity: 0, duration: fadeOut, ease: 'power2.out' }, end - fadeOut);
    });

    // ── Sync to voiceover ────────────────────────────────────────────────────
    vo.addEventListener('canplaythrough', () => {
      tl.play();
      vo.play();
    });

    // Tick timeline with audio currentTime for frame-accurate sync
    function tick() {
      if (!vo.paused) tl.seek(vo.currentTime);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // ── HyperFrames render hook ──────────────────────────────────────────────
    // When running via `npx hyperframes render`, the framework seeks the
    // timeline frame-by-frame rather than playing in real-time.
    window.__HYPERFRAMES_DURATION__ = 120;
    window.__HYPERFRAMES_FPS__      = 30;
  </script>
</body>
</html>
