<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .mark {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: #c8964c;
      text-transform: uppercase;
      opacity: 0;
    }

    .sigil-ring {
      width: 120px;
      height: 120px;
      border: 1.5px solid #c8964c;
      border-radius: 50%;
      position: relative;
      opacity: 0;
    }
    .sigil-ring::before {
      content: '';
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(200,150,76,0.4);
      border-radius: 50%;
    }
    .sigil-inner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #c8964c;
      letter-spacing: 0.05em;
    }

    .title {
      font-size: 13px;
      letter-spacing: 0.5em;
      color: #f5f0e8;
      text-transform: uppercase;
      opacity: 0;
    }

    .district {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: rgba(245,240,232,0.4);
      text-transform: uppercase;
      opacity: 0;
    }

    .date {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(200,150,76,0.6);
      opacity: 0;
      margin-top: 8px;
    }

    .rule {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8964c, transparent);
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="mark">HELEN OS</div>
  <div class="rule" id="rule-top"></div>
  <div class="sigil-ring">
    <div class="sigil-inner">H</div>
  </div>
  <div class="rule" id="rule-bot"></div>
  <div class="title">Temple — HER</div>
  <div class="district">authority : none &nbsp;·&nbsp; free speech &nbsp;·&nbsp; no claim</div>
  <div class="date" id="date-el">{{DATE}}</div>

  <script>
    const tl = gsap.timeline({ delay: 0.2 });
    const els = document.querySelectorAll('.mark, .sigil-ring, .title, .district, .date, .rule');

    tl.to('.mark',        { opacity: 1, y: 0, duration: 1.2, ease: 'power2.out' }, 0)
      .to('#rule-top',    { opacity: 1, scaleX: 1, duration: 1,   ease: 'power2.inOut' }, 0.4)
      .to('.sigil-ring',  { opacity: 1, scale: 1, rotation: 0, duration: 1.4, ease: 'back.out(1.4)' }, 0.6)
      .to('#rule-bot',    { opacity: 1, scaleX: 1, duration: 1,   ease: 'power2.inOut' }, 0.8)
      .to('.title',       { opacity: 1, duration: 1, ease: 'power2.out' }, 1.0)
      .to('.district',    { opacity: 1, duration: 1, ease: 'power2.out' }, 1.3)
      .to('.date',        { opacity: 1, duration: 0.8, ease: 'power2.out' }, 1.6);

    // Populate date from config if injected by generate script
    const d = document.getElementById('date-el');
    if (d.textContent === '{{DATE}}') {
      d.textContent = new Date().toISOString().slice(0, 10);
    }
  </script>
</body>
</html>
